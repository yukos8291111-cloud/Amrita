<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Amrita 毎日のチェック</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hiragino Mincho ProN',serif;background:#faf8f5;color:#3a3a3a;padding:20px;max-width:600px;margin:0 auto}h1{font-size:1.2rem;text-align:center;margin:30px 0 10px;letter-spacing:.1em;color:#5a4a3a}p.subtitle{text-align:center;font-size:.85rem;color:#888;margin-bottom:30px}.question{margin-bottom:28px}.question label{display:block;font-size:.95rem;margin-bottom:10px;color:#4a3a2a}.slider-row{display:flex;align-items:center;gap:10px}.slider-row input[type=range]{flex:1;accent-color:#b89a7a}.slider-val{width:24px;text-align:center;font-size:.95rem;color:#7a5a3a}textarea{width:100%;padding:10px;border:1px solid #d5c9bb;border-radius:6px;font-size:.9rem;font-family:inherit;background:#fff;resize:vertical}input[type=text],input[type=email]{width:100%;padding:10px;border:1px solid #d5c9bb;border-radius:6px;font-size:.9rem;font-family:inherit;background:#fff;margin-top:4px}.send-btn{display:block;width:100%;padding:14px;background:#b89a7a;color:#fff;border:none;border-radius:8px;font-size:1rem;font-family:inherit;letter-spacing:.1em;cursor:pointer;margin-top:10px}.send-btn:hover{background:#a08060}#thankyou{display:none;text-align:center;padding:40px 20px;font-size:1rem;line-height:2;color:#5a4a3a}</style></head><body><div id="form-area"><h1>毎日のチェック</h1><p class="subtitle">今日のあなたの状態を教えてください</p><div class="question"><label>🌿 身体の状態（1=重い・だるい　10=軽やか・快適）</label><div class="slider-row"><input type="range" id="body" min="1" max="10" value="5" oninput="document.getElementById('bv').textContent=this.value"><span class="slider-val" id="bv">5</span></div></div><div class="question"><label>🌬 呼吸の状態（1=浅い・苦しい　10=深い・楽）</label><div class="slider-row"><input type="range" id="breath" min="1" max="10" value="5" oninput="document.getElementById('brv').textContent=this.value"><span class="slider-val" id="brv">5</span></div></div><div class="question"><label>💭 思考の状態（1=ぐるぐる・混乱　10=クリア・静か）</label><div class="slider-row"><input type="range" id="thought" min="1" max="10" value="5" oninput="document.getElementById('tv').textContent=this.value"><span class="slider-val" id="tv">5</span></div></div><div class="question"><label>💛 感情の状態（1=不安・落ち込み　10=穏やか・満たされている）</label><div class="slider-row"><input type="range" id="emotion" min="1" max="10" value="5" oninput="document.getElementById('ev').textContent=this.value"><span class="slider-val" id="ev">5</span></div></div><div class="question"><label>✨ エネルギーの状態（1=枯渇　10=満ちている）</label><div class="slider-row"><input type="range" id="energy" min="1" max="10" value="5" oninput="document.getElementById('env').textContent=this.value"><span class="slider-val" id="env">5</span></div></div><div class="question"><label>📝 自由記述（今日の気づき・感じていること）</label><textarea id="free" rows="4" placeholder="自由に書いてください"></textarea></div><div class="question"><label>📧 メールアドレス</label><input type="email" id="email" placeholder="example@email.com"></div><div class="question"><label>👤 お名前</label><input type="text" id="name" placeholder="お名前"></div><button class="send-btn" onclick="submitForm()">送信する</button></div><div id="thankyou"><p>送信できました。<br>今日も、ご自身に向き合ってくださってありがとうございます。<br>ゆっくりお過ごしください。</p></div><script>var GAS_URL='https://script.google.com/macros/s/AKfycbw3W96QU4_crRknHWP85y4ie0LdRXPMgUm2Zg66AlFsNi8AsR2JEspKIEBUtdI2Ho24/exec';function submitForm(){var btn=document.querySelector('.send-btn');btn.disabled=true;btn.textContent='送信中...';var params='entry.809900239='+encodeURIComponent(document.getElementById('body').value)+'&entry.398784967='+encodeURIComponent(document.getElementById('breath').value)+'&entry.1759120419='+encodeURIComponent(document.getElementById('thought').value)+'&entry.1647267138='+encodeURIComponent(document.getElementById('emotion').value)+'&entry.1244468022='+encodeURIComponent(document.getElementById('energy').value)+'&entry.1167531511='+encodeURIComponent(document.getElementById('free').value)+'&entry.933374436='+encodeURIComponent(document.getElementById('email').value)+'&entry.425937310='+encodeURIComponent(document.getElementById('name').value);var s=document.createElement('script');s.src=GAS_URL+'?callback=onSuccess&'+params;document.body.appendChild(s);setTimeout(function(){document.getElementById('form-area').style.display='none';document.getElementById('thankyou').style.display='block';},2000);}function onSuccess(){document.getElementById('form-area').style.display='none';document.getElementById('thankyou').style.display='block';}</script></body></html>
